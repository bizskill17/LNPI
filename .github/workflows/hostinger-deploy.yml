name: Deploy to Hostinger (Shared Hosting)

on:
  push:
    branches: ["main"]

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Caching is optional; disable by default to avoid failures when a lockfile
          # isn't present yet in the repo.
          # cache: npm
          # cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Backend: upload PHP files to public_html
      - name: Deploy backend (public_html)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./backend/public/
          # Hostinger FTP root contains a `public_html/` folder (per File Manager).
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.github/**

      - name: Deploy backend src (public_html/src)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./backend/src/
          server-dir: /public_html/src/
          exclude: |
            **/.git*
            **/.github/**

      # Frontend: upload built static assets to public_html/app
      - name: Deploy frontend (public_html/app)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./frontend/dist/
          server-dir: /public_html/app/
